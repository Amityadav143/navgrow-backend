spring:
  application:
    name: navgrow-backend

  # ── Database ──────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/navgrowdevdb}
    username: ${DB_USER:navgrowdev}
    password: ${DB_PASSWORD:Navgrow@jul25}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Flyway DB migrations ───────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Email / SMTP ───────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.hostinger.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:info@navgrow.org}
    password: ${MAIL_PASSWORD:Ng@jan26}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000

  # ── File upload ────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  # ── OAuth2 social login ────────────────────────────────────────────────
  # Google login activates only when GOOGLE_CLIENT_ID & GOOGLE_CLIENT_SECRET are set.
  # Console: https://console.cloud.google.com  →  Authorised redirect URI:
  #   {BASE_URL}/login/oauth2/code/google
  # Add Facebook / GitHub / etc. as additional entries under registration/.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile

  # ── Cache ──────────────────────────────────────────────────────────────
  cache:
    type: simple

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  # Honour X-Forwarded-Proto/Host from the reverse proxy so OAuth redirect
  # URIs are built as https://navgrow.org/... instead of http://localhost:8080.
  forward-headers-strategy: framework
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
  error:
    include-message: always
    include-binding-errors: always


# ── Springdoc / Swagger ────────────────────────────────────────────────────
# With context-path /api, Swagger UI is at /api/swagger-ui.html
# and the OpenAPI JSON at /api/v3/api-docs
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true
  default-produces-media-type: application/json

# ── JWT ────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:navgrow-super-secret-key-256-bits-minimum-length-for-hs512}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH:604800000}

# ── Razorpay ───────────────────────────────────────────────────────────────
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_1DP5mmOlF5G5ag}
  key-secret: ${RAZORPAY_KEY_SECRET:your_razorpay_secret}
  currency: INR
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:your_webhook_secret}

# ── App Config ─────────────────────────────────────────────────────────────
app:
  name: Navgrow Engineering Service Pvt. Ltd.
  contact-email: info@navgrow.org
  support-phone: "+918927070972"
  base-url: ${BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  upload-dir: ${UPLOAD_DIR:./uploads}
  allowed-origins:
    - ${FRONTEND_URL:http://localhost:5173}
    - https://navgrow.org
    - https://www.navgrow.org

# ── SMS ────────────────────────────────────────────────────────────────────
# provider: log (dev, default) | msg91 | twilio
sms:
  provider: ${SMS_PROVIDER:log}
  sender-id: ${SMS_SENDER_ID:NAVGRW}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:}
    otp-template-id: ${MSG91_OTP_TEMPLATE_ID:}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Navgrow Backend API
    version: 1.0.0
    description: REST API for Navgrow Engineering Service

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.navgrow: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/navgrow-backend.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 300MB

---
# ── Development profile ────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
logging:
  level:
    com.navgrow: DEBUG

---
# ── Production profile ─────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
logging:
  level:
    com.navgrow: INFO
    org.springframework: WARN

# ── Anthropic Chatbot ──────────────────────────────────────────────────────────
anthropic:
  api-key: ${ANTHROPIC_API_KEY:TEST}
  api-url: https://api.anthropic.com/v1/messages
  model: claude-opus-4-5
  max-tokens: 1024
  chat-rate-limit: 30
